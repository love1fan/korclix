        const auth = firebase.auth(); const db = firebase.firestore();
        let isUserAdmin = false; let userNick = "익명";
        
        const CLAN_MEMBERS = [{ nickname: "CLX_0dB" }, { nickname: "Viper789456" }, { nickname: "joa1013" }];

        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("users").doc(user.uid).get().then((doc) => {
                    if (doc.exists) { const data = doc.data(); userNick = data.nickname || user.email.split('@')[0]; isUserAdmin = data.isAdmin === true; }

                    document.getElementById('nav-user-info').innerText = userNick + "님"; 
                    document.getElementById('clear-all-btn').style.display = isUserAdmin ? 'block' : 'none'; 
                    loadMessages();
                });
            } else { Swal.fire({title:'로그인 필요', text:'채팅을 보려면 로그인해주세요.', icon:'info', background:'#111', color:'#fff'}).then(()=>location.href='index.html'); }

        function changeStream(platform, id, btn) { const iframe = document.getElementById('live-iframe'); const btns = document.querySelectorAll('.stream-tab-btn'); btns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); if (platform === 'chzzk') iframe.src = `https://chzzk.naver.com/live/${id}/embed`; else if (platform === 'soop') iframe.src = `https://play.soop.st/embed/station/${id}`; else if (platform === 'youtube') iframe.src = `https://www.youtube.com/embed/live_stream?channel=${id}&autoplay=1&mute=1`; }
        function getNicknameColor(nickname) { const colors = ['#ff5e00', '#4ee29d', '#00d4ff', '#ffcc00', '#ff4e50', '#8e44ad', '#3498db', '#f1c40f']; let hash = 0; for (let i = 0; i < nickname.length; i++) { hash = nickname.charCodeAt(i) + ((hash << 5) - hash); } return colors[Math.abs(hash) % colors.length]; }
        function loadMessages() {
            const chatBox = document.getElementById('chat-messages');
            db.collection("chats").orderBy("createdAt", "asc").limitToLast(50).onSnapshot((snapshot) => {
                chatBox.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data(); const msgId = doc.id; const div = document.createElement('div'); div.className = 'chat-msg-item';
                    const deleteBtn = isUserAdmin ? `<span onclick="deleteMessage('${msgId}')" style="color:#ff3333; cursor:pointer; float:right; font-size:10px; font-weight:bold;">[X]</span>` : "";
                    const nickColor = getNicknameColor(data.nickname); let badge = '🔰'; 
                    if (data.nickname === 'CLX_0dB' || data.isAdmin) badge = '👑'; else if (data.nickname.startsWith('CLX_') || CLAN_MEMBERS.some(m => m.nickname === data.nickname)) badge = '🔫'; 
                    div.innerHTML = `${deleteBtn}<span class="chat-nickname" style="color: ${nickColor};"><span class="chat-badge">${badge}</span> ${data.nickname}</span><div class="chat-text" style="color: #eee;">${data.text}</div>`;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
        function sendMessage() { const user = auth.currentUser; const input = document.getElementById('chat-input'); const message = input.value.trim(); if (!user) return alert("로그인 후 이용 가능합니다."); if (!message) return; db.collection("chats").add({ nickname: userNick, text: message, createdAt: firebase.firestore.FieldValue.serverTimestamp() }).then(() => { input.value = ""; }); }
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        function deleteMessage(msgId) { if (!confirm("이 메시지를 삭제하시겠습니까?")) return; db.collection("chats").doc(msgId).delete(); }
        async function clearAllChats() { if (!isUserAdmin) return; if (!confirm("모든 채팅 기록을 삭제하시겠습니까?")) return; try { const snapshot = await db.collection("chats").get(); const batch = db.batch(); snapshot.docs.forEach((doc) => { batch.delete(doc.ref); }); await batch.commit(); alert("초기화 완료"); } catch (err) { alert(err.message); } }
        function logout() { if(confirm("로그아웃 하시겠습니까?")) auth.signOut().then(()=>location.href='index.html'); }
