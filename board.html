<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG CLIX | 자유게시판</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; padding: 140px 8% 50px 8%; background-color: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; line-height: 1.6; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(0,0,0,0.95) !important; position: fixed; width: 100%; top: 0; left: 0; box-sizing: border-box; z-index: 100; border-bottom: 1px solid #222; }
        nav .logo { font-weight: 900; font-size: 26px; color: #ff5e00 !important; text-decoration: none; text-transform: uppercase; }
        nav ul { list-style: none; display: flex; margin: 0; padding: 0; }
        nav ul li a { margin-left: 20px; font-size: 12px; color: #999; text-decoration: none; text-transform: uppercase; font-weight: 600; }
        .header { border-bottom: 2px solid #ff5e00; padding-bottom: 20px; margin-bottom: 40px; }
        h1 { color: #ff5e00; letter-spacing: 3px; margin: 0; font-size: 2.5rem; text-transform: uppercase; font-weight: 900; }
        #write-section { display: none; border: 1px solid #222; padding: 30px; margin-bottom: 50px; border-radius: 8px; background: #111; }
        textarea { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; resize: none; margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-post { background: #ff5e00; color: #fff; padding: 15px; border: none; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 4px; }
        .post-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 30px; margin-bottom: 25px; position: relative; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #222; }
        .post-author { color: #ff5e00; font-weight: 800; }
        .post-content { color: #ddd; white-space: pre-wrap; margin-bottom: 15px; }
        .post-media img, .post-media video { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #222; }
        .btn-del { color: #ff3333; cursor: pointer; font-size: 0.75rem; position: absolute; bottom: 30px; right: 30px; display: none; border: 1px solid #422; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo">CLAN CLIX</a><ul><li><a href="index.html#about">ABOUT</a></li><li><a href="board.html" style="color: #ff5e00;">BOARD</a></li></ul></nav>
    <div class="header"><h1>BOARD</h1></div>
    <div id="write-section">
        <div id="display-nick" style="color:#ff5e00; font-weight:800; margin-bottom:10px;">작성자 로딩 중...</div>
        <textarea id="post-content" rows="4" placeholder="내용을 입력하세요."></textarea>
        <input type="text" id="media-url" placeholder="이미지 또는 동영상 링크 주소 (선택 사항)">
        <button class="btn-post" onclick="savePost()">POST MESSAGE</button>
    </div>
    <div id="login-notice" style="text-align:center; padding:30px; border:1px dashed #333; color:#555;">회원만 작성 가능합니다. <a href="index.html" style="color:#ff5e00;">로그인하기</a></div>
    <div id="board-container"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFSAu2aynX6YPiJEatWy9IQgWgUuTx8ds",
            authDomain: "korclix.firebaseapp.com",
            projectId: "korclix",
            storageBucket: "korclix.firebasestorage.app",
            messagingSenderId: "472792477536",
            appId: "1:472792477536:web:14907e228c343b72fd7805"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let userNick = "";

        auth.onAuthStateChanged((user) => {
            if (user && user.emailVerified) {
                document.getElementById('write-section').style.display = 'block';
                document.getElementById('login-notice').style.display = 'none';
                db.collection("users").doc(user.uid).get().then(doc => {
                    userNick = doc.exists ? doc.data().nickname : "익명";
                    document.getElementById('display-nick').innerText = "작성자: " + userNick;
                });
            }
            loadPosts();
        });

        function loadPosts() {
            db.collection("board").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('board-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    let mediaHtml = "";
                    if (data.mediaUrl) {
                        if (data.mediaUrl.match(/\.(mp4|webm|ogg)/i)) {
                            mediaHtml = `<div class="post-media"><video src="${data.mediaUrl}" controls></video></div>`;
                        } else {
                            mediaHtml = `<div class="post-media"><img src="${data.mediaUrl}"></div>`;
                        }
                    }
                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-header"><span class="post-author">${data.nickname}</span></div>
                            <div class="post-content">${data.content}</div>
                            ${mediaHtml}
                            <button class="btn-del" style="display:${sessionStorage.getItem('clix_master')==='true'?'block':'none'}" onclick="deletePost('${doc.id}')">DELETE</button>
                        </div>`;
                });
            });
        }

        async function savePost() {
            const content = document.getElementById('post-content').value.trim();
            const mediaUrl = document.getElementById('media-url').value.trim();
            if (!content) return alert("내용을 입력하세요.");
            await db.collection("board").add({
                nickname: userNick,
                content: content,
                mediaUrl: mediaUrl || null,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('post-content').value = "";
            document.getElementById('media-url').value = "";
        }

        function deletePost(id) { if(confirm("삭제하시겠습니까?")) db.collection("board").doc(id).delete(); }
    </script>
</body>
</html>
