<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG CLIX | 자유게시판</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>

    <style>
        body { 
            margin: 0; padding: 140px 8% 50px 8%; background-color: #0a0a0a; color: #ffffff; 
            font-family: 'Inter', sans-serif; line-height: 1.6;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        /* 네비게이션바 */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(0,0,0,0.95) !important; position: fixed; width: 100%; top: 0; left: 0; box-sizing: border-box; z-index: 100; border-bottom: 1px solid #222; }
        nav .logo { font-weight: 900; font-size: 26px; color: #ff5e00 !important; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
        nav ul { list-style: none; display: flex; margin: 0; padding: 0; align-items: center; }
        nav ul li a { margin-left: 20px; font-size: 12px; color: #999; text-decoration: none; text-transform: uppercase; font-weight: 600; }
        
        /* 헤더 */
        .header { border-bottom: 2px solid #ff5e00; padding-bottom: 20px; margin-bottom: 40px; }
        h1 { color: #ff5e00; letter-spacing: 3px; margin: 0; font-size: 2.5rem; text-transform: uppercase; font-weight: 900; }

        /* 글쓰기 구역 (회원 전용) */
        #write-section { display: none; border: 1px solid #222; padding: 30px; margin-bottom: 50px; border-radius: 8px; background: #111; }
        .user-info-display { color: #ff5e00; font-weight: 800; margin-bottom: 15px; font-size: 1rem; }
        textarea { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; font-family: inherit; resize: none; margin-bottom: 15px; font-size: 1rem; }
        
        /* 파일 업로드 컨트롤 */
        .upload-controls { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: #000; padding: 15px; border-radius: 4px; border: 1px solid #222; }
        .file-label { background: #ff5e00; color: #fff; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
        .file-label:hover { background: #ff8533; }
        #file-input { display: none; }
        #file-name { font-size: 0.85rem; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-post { background: #ff5e00; color: #fff; padding: 15px; border: none; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; border-radius: 4px; font-size: 1.1rem; letter-spacing: 1px; transition: 0.3s; }
        .btn-post:disabled { background: #333; cursor: not-allowed; color: #666; }

        /* 게시글 카드 디자인 */
        .post-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 30px; margin-bottom: 30px; position: relative; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #222; }
        .post-author { color: #ff5e00; font-weight: 900; font-size: 1.1rem; }
        .post-date { color: #555; font-size: 0.85rem; font-weight: 600; }
        .post-content { color: #ddd; white-space: pre-wrap; font-size: 1.05rem; line-height: 1.8; margin-bottom: 20px; }
        
        /* 미디어 렌더링 */
        .post-media-container { margin-top: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #222; background: #000; }
        .post-media-container img, .post-media-container video { width: 100%; height: auto; display: block; max-height: 600px; object-fit: contain; }

        /* 비회원 안내 */
        #login-notice { border: 1px dashed #333; padding: 40px; text-align: center; margin-bottom: 50px; border-radius: 12px; color: #555; font-weight: 700; }
        #login-notice a { color: #ff5e00; text-decoration: none; border-bottom: 1px solid #ff5e00; }

        .btn-del { color: #ff3333; cursor: pointer; font-size: 0.75rem; position: absolute; top: 30px; right: 30px; display: none; font-weight: 900; border: 1px solid #442222; padding: 6px 12px; border-radius: 4px; text-transform: uppercase; }
        .btn-del:hover { background: #ff3333; color: #fff; }
    </style>
</head>
<body oncontextmenu="return false">

    <nav>
        <a href="index.html" class="logo">CLAN CLIX</a>
        <ul>
            <li><a href="index.html#about">ABOUT</a></li>
            <li><a href="notice.html">NOTICE</a></li>
            <li><a href="board.html" style="color: #ff5e00;">BOARD</a></li>
            <li><a href="members.html">MEMBERS</a></li>
        </ul>
    </nav>

    <div class="header">
        <h1>BOARD</h1>
    </div>

    <div id="write-section">
        <div class="user-info-display" id="display-nick">인증 대기 중...</div>
        <textarea id="post-content" rows="4" placeholder="클랜원들과 공유하고 싶은 소식이나 영상을 올려보세요."></textarea>
        
        <div class="upload-controls">
            <label for="file-input" class="file-label">이미지 / 영상 첨부</label>
            <input type="file" id="file-input" accept="image/*, video/*" onchange="previewFileName()">
            <span id="file-name">선택된 파일이 없습니다 (최대 20MB)</span>
        </div>

        <button id="submit-btn" class="btn-post" onclick="savePost()">POST MESSAGE</button>
    </div>

    <div id="login-notice">
        게시글 작성은 클랜원만 가능합니다. <a href="index.html">로그인 페이지로 이동</a>
    </div>

    <div id="board-container">
        <p style="text-align:center; color:#333; padding: 50px; font-weight: 800;">콘텐츠를 불러오는 중...</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFSAu2aynX6YPiJEatWy9IQgWgUuTx8ds",
            authDomain: "korclix.firebaseapp.com",
            projectId: "korclix",
            storageBucket: "korclix.firebasestorage.app",
            messagingSenderId: "472792477536",
            appId: "1:472792477536:web:14907e228c343b72fd7805"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let userNick = "";

        auth.onAuthStateChanged((user) => {
            const writeArea = document.getElementById('write-section');
            const noticeArea = document.getElementById('login-notice');
            if (user && user.emailVerified) {
                writeArea.style.display = 'block';
                noticeArea.style.display = 'none';
                db.collection("users").doc(user.uid).get().then((doc) => {
                    userNick = doc.exists ? doc.data().nickname : user.email.split('@')[0];
                    document.getElementById('display-nick').innerText = "작성자: " + userNick;
                });
            } else {
                writeArea.style.display = 'none';
                noticeArea.style.display = 'block';
            }
            fetchPosts();
        });

        function previewFileName() {
            const file = document.getElementById('file-input').files[0];
            document.getElementById('file-name').innerText = file ? file.name : "선택된 파일이 없습니다 (최대 20MB)";
        }

        function fetchPosts() {
            db.collection("board").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                const list = document.getElementById('board-container');
                list.innerHTML = "";
                
                snapshot.forEach((doc) => {
                    const post = doc.data();
                    const date = post.timestamp ? post.timestamp.toDate().toLocaleString('ko-KR') : '방금 전';
                    const masterMode = sessionStorage.getItem('clix_master') === 'true';

                    let mediaSection = "";
                    if (post.mediaUrl) {
                        if (post.mediaType.startsWith("image")) {
                            mediaSection = `<div class="post-media-container"><img src="${post.mediaUrl}" loading="lazy"></div>`;
                        } else if (post.mediaType.startsWith("video")) {
                            mediaSection = `<div class="post-media-container"><video src="${post.mediaUrl}" controls></video></div>`;
                        }
                    }

                    list.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <span class="post-author">${post.nickname}</span>
                                <span class="post-date">${date}</span>
                            </div>
                            <div class="post-content">${post.content}</div>
                            ${mediaSection}
                            <button class="btn-del" style="display:${masterMode ? 'block' : 'none'}" onclick="trashPost('${doc.id}', '${post.mediaPath || ''}')">DELETE</button>
                        </div>
                    `;
                });
            });
        }

        async function savePost() {
            const text = document.getElementById('post-content').value.trim();
            const picker = document.getElementById('file-input');
            const file = picker.files[0];
            const btn = document.getElementById('submit-btn');

            if (!text && !file) return alert("내용 또는 파일을 추가해 주세요.");

            btn.disabled = true;
            btn.innerText = "업로드 중...";

            let url = null;
            let type = null;
            let path = null;

            try {
                if (file) {
                    if (file.size > 20 * 1024 * 1024) throw new Error("20MB 이하의 파일만 가능합니다.");
                    
                    const ext = file.name.split('.').pop();
                    path = `board/${Date.now()}_${auth.currentUser.uid}.${ext}`;
                    const ref = storage.ref(path);
                    
                    await ref.put(file);
                    url = await ref.getDownloadURL();
                    type = file.type;
                }

                await db.collection("board").add({
                    nickname: userNick,
                    content: text,
                    uid: auth.currentUser.uid,
                    mediaUrl: url,
                    mediaType: type,
                    mediaPath: path,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById('post-content').value = "";
                picker.value = "";
                previewFileName();
                alert("게시되었습니다!");

            } catch (e) {
                alert("실패: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "POST MESSAGE";
            }
        }

        async function trashPost(id, path) {
            if (!confirm("삭제할까요?")) return;
            try {
                if (path) await storage.ref(path).delete();
                await db.collection("board").doc(id).delete();
            } catch (e) {
                alert("삭제 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
