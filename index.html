<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG CLIX CLAN | 공식 홈페이지</title>
    <style>
        body { margin: 0; font-family: 'Inter', 'Segoe UI', sans-serif; background-color: #0a0a0a; color: #ffffff; line-height: 1.6; overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(0,0,0,0.9); position: fixed; width: 100%; box-sizing: border-box; z-index: 100; border-bottom: 1px solid #222; }
        nav .logo { font-weight: 900; font-size: 28px; color: #ff5e00; letter-spacing: 2px; text-transform: uppercase; }
        nav ul { list-style: none; display: flex; margin: 0; padding: 0; }
        nav ul li { margin-left: 40px; font-size: 14px; font-weight: 600; cursor: pointer; color: #999; transition: 0.3s; text-transform: uppercase; }
        nav ul li:hover { color: #ff5e00; }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; }
        .hero h1 { font-size: 7rem; margin: 0; letter-spacing: 18px; font-weight: 900; color: #fff; text-shadow: 0 0 25px rgba(255, 94, 0, 0.5); text-transform: uppercase; }
        /* 요청하신 문구 수정 부분 */
        .hero p { font-size: 1.2rem; color: #aaa; margin-top: 10px; letter-spacing: 4px; font-weight: 500; text-transform: uppercase; }
        
        .btn-join { margin-top: 40px; padding: 18px 50px; background: #ff5e00; color: white; text-decoration: none; font-weight: 800; border-radius: 0px; transition: 0.4s; border: 1px solid #ff5e00; letter-spacing: 2px; text-transform: uppercase; }
        .btn-join:hover { background: transparent; color: #ff5e00; box-shadow: 0 0 30px rgba(255, 94, 0, 0.3); }

        .section { padding: 120px 8%; max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 70px; text-align: center; letter-spacing: 6px; color: #ff5e00; text-transform: uppercase; }
        .member-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .member-card { background: #111; padding: 45px 35px; border: 1px solid #222; transition: 0.3s; position: relative; }
        .member-card:hover { border-color: #ff5e00; transform: translateY(-12px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .member-card h3 { font-size: 1.6rem; margin: 0 0 10px 0; color: #fff; font-weight: 800; }
        .member-card p { font-size: 0.95rem; color: #777; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin: 0; }

        footer { padding: 60px; text-align: center; border-top: 1px solid #222; background-color: #080808; color: #555; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">CLIX</div>
        <ul>
            <li>ABOUT</li>
            <li>MEMBERS</li>
            <li>JOIN</li>
        </ul>
    </nav>

    <section class="hero">
        <h1>CLIX</h1>
        <p>BATTLEGROUND KOR CLIX</p>
        <a href="#join" class="btn-join">JOIN THE SQUAD</a>
    </section>

    <section class="section" id="members">
        <h2 class="section-title">CLIX CLAN MEMBERS</h2>
        <div class="member-grid">
            <div class="member-card"><h3>CLIX_MASTER</h3><p>In-Game Leader</p></div>
            <div class="member-card"><h3>CLIX_GHOST</h3><p>Sniper / Scout</p></div>
            <div class="member-card"><h3>CLIX_STORM</h3><p>Main Attacker</p></div>
            <div class="member-card"><h3>CLIX_WOLF</h3><p>Support / Driver</p></div>
        </div>
    </section>

    <footer>
        &copy; 2026 CLIX CLAN. ALL RIGHTS RESERVED.
    </footer>
</body>
</html>
