<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NOTICE | CLIX</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 50px 8%; }
        .header { border-bottom: 2px solid #ff5e00; padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; }
        .back-btn { color: #888; text-decoration: none; border: 1px solid #333; padding: 10px 20px; }
        .notice-card { background: #111; border-left: 5px solid #ff5e00; padding: 30px; margin-bottom: 20px; }
        .tag { background: #ff5e00; color: #fff; padding: 3px 10px; font-size: 0.8rem; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="header"><h1>NOTICE</h1><a href="index.html" class="back-btn">HOME</a></div>
    <div id="notice-container"><p>불러오는 중...</p></div>
    <script>
        const sheetId = '11iF6vZJag6R8CC0VzRqezK0HzK7GbMtqRBEmSsIfGec'; 
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&t=${new Date().getTime()}`;
        fetch(url).then(res => res.text()).then(text => {
            const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
            const rows = json.table.rows;
            let html = '';
            for (let i = 1; i < rows.length; i++) { // 1행 건너뛰고 2행부터
                const r = rows[i].c;
                if(!r || !r[1]) continue;
                html += `<div class="notice-card"><span class="tag">${r[0]?r[0].v:''}</span><strong>${r[1]?r[1].v:''}</strong><p>${r[3]?r[3].v:''}</p></div>`;
            }
            document.getElementById('notice-container').innerHTML = html || '공지가 없습니다.';
        });
    </script>
</body>
</html>
