<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIX NOTICE</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { 
            margin: 0; padding: 120px 8% 50px 8%; background-color: #0a0a0a; color: #ffffff; 
            font-family: 'Inter', sans-serif; line-height: 1.6;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(0,0,0,0.95) !important; position: fixed; width: 100%; top: 0; left: 0; box-sizing: border-box; z-index: 100; border-bottom: 1px solid #222; }
        nav .logo { font-weight: 900; font-size: 26px; color: #ff5e00 !important; text-decoration: none !important; background: none !important; padding: 0 !important; }
        nav ul { list-style: none; display: flex; margin: 0; padding: 0; }
        nav ul li a { margin-left: 20px; font-size: 12px; color: #999; text-decoration: none; text-transform: uppercase; }

        .header { border-bottom: 2px solid #ff5e00; padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #ff5e00; letter-spacing: 3px; margin: 0; font-size: 2rem; text-transform: uppercase; font-weight: 900; }
        
        /* 버튼 영역 스타일 */
        .header-btns { display: flex; gap: 10px; }
        .back-btn { color: #888; text-decoration: none; border: 1px solid #333; padding: 10px 25px; border-radius: 4px; font-weight: bold; transition: 0.3s; display: flex; align-items: center; }
        .back-btn:hover { background: #ff5e00; color: #fff; border-color: #ff5e00; }
        .admin-btn { background: transparent; color: #ff5e00; border: 1px solid #ff5e00; padding: 10px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: inherit; }
        .admin-btn:hover { background: #ff5e00; color: #fff; }

        /* 커스텀 공지사항 작성 폼 */
        #admin-editor { display: none; border: 2px solid #ff5e00; padding: 25px; margin-bottom: 40px; border-radius: 4px; background: #111; }
        .editor-title { color: #ff5e00; font-weight: bold; margin-bottom: 15px; display: block; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; box-sizing: border-box; font-family: inherit; }
        .btn-save { background: #ff5e00; color: #fff; padding: 12px; border: none; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }

        /* 공지사항 출력 목록 */
        .info-box { background: #111; border-left: 5px solid #ff5e00; padding: 25px; margin-bottom: 40px; color: #aaa; font-size: 0.95rem; border-radius: 2px; }
        .notice-list { display: flex; flex-direction: column; gap: 20px; }
        .notice-card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 30px; position: relative; }
        .notice-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .notice-title { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .notice-tag { background: #ff5e00; color: #fff; padding: 3px 10px; border-radius: 3px; font-size: 0.8rem; margin-right: 10px; }
        .notice-date { color: #666; font-size: 0.9rem; }
        .notice-content { color: #bbb; white-space: pre-wrap; line-height: 1.8; }
        .btn-del { color: #ff3333; cursor: pointer; font-size: 0.8rem; position: absolute; bottom: 20px; right: 30px; display: none; text-decoration: underline; }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false">

    <nav>
        <a href="index.html" class="logo">CLAN CLIX</a>
        <ul>
            <li><a href="index.html#about">ABOUT</a></li>
            <li><a href="notice.html" style="color: #ff5e00;">NOTICE</a></li>
            <li><a href="board.html">BOARD</a></li>
        </ul>
    </nav>

    <div class="header">
        <h1>CLIX NOTICE</h1>
        <div class="header-btns">
            <button class="admin-btn" onclick="authAdmin()">관리자 로그인</button>
            <a href="index.html" class="back-btn">BACK TO HOME</a>
        </div>
    </div>

    <div id="admin-editor">
        <span class="editor-title">새 공지사항 작성</span>
        <input type="text" id="tag" placeholder="태그 (예: [필독], [공지])" style="width: 20%;">
        <input type="text" id="title" placeholder="제목을 입력하세요" style="width: 78%; float: right;">
        <textarea id="content" rows="6" placeholder="내용을 입력하세요"></textarea>
        <button class="btn-save" onclick="saveNotice()">공지 등록하기</button>
    </div>

    <div class="info-box">
        📢 <strong style="color:#ff5e00;">필독 공지사항:</strong> korclix 운영진이 전하는 공식 소식입니다.
    </div>

    <div class="notice-list" id="notice-container">
        <p style="text-align:center; color:#555; margin-top:30px;">데이터를 불러오는 중입니다...</p>
    </div>

    <script>
        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyAFSAu2aynX6YPiJEatWy9IQgWgUuTxBds",
            authDomain: "korclix.firebaseapp.com",
            projectId: "korclix",
            storageBucket: "korclix.firebasestorage.app",
            messagingSenderId: "472792477536",
            appId: "1:472792477536:web:14907e228c343b72fd7005"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.onload = function() {
            if(sessionStorage.getItem('clix_master') === 'true') {
                showAdminUI();
            }
            loadNotices();
        };

        // 관리자 인증
        function authAdmin() {
            if(prompt("관리자 코드를 입력하세요.") === "9763") {
                sessionStorage.setItem('clix_master', 'true');
                showAdminUI();
                alert("관리자 모드가 활성화되었습니다.");
            } else {
                alert("비밀번호가 일치하지 않습니다.");
            }
        }

        function showAdminUI() {
            document.getElementById('admin-editor').style.display = 'block';
            document.querySelectorAll('.btn-del').forEach(b => b.style.display = 'block');
            document.querySelector('.admin-btn').style.display = 'none'; // 로그인 성공 시 버튼 숨김
        }

        // Firebase 데이터 실시간 불러오기
        function loadNotices() {
            db.collection("notices").orderBy("timestamp", "desc").onSnapshot((querySnapshot) => {
                const container = document.getElementById('notice-container');
                container.innerHTML = ""; 

                if (querySnapshot.empty) {
                    container.innerHTML = '<p style="text-align:center; color:#555;">등록된 공지가 없습니다.</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const dateStr = data.timestamp ? data.timestamp.toDate().toLocaleDateString() : '방금 전';
                    const adminDisplay = sessionStorage.getItem('clix_master') === 'true' ? 'block' : 'none';

                    container.innerHTML += `
                        <div class="notice-card">
                            <div class="notice-header">
                                <div class="notice-title"><span class="notice-tag">${data.tag || '[공지]'}</span>${data.title}</div>
                                <div class="notice-date">${dateStr}</div>
                            </div>
                            <div class="notice-content">${data.content}</div>
                            <div class="btn-del" style="display:${adminDisplay}" onclick="deleteNotice('${doc.id}')">삭제</div>
                        </div>
                    `;
                });
            });
        }

        // Firebase 데이터 쓰기
        function saveNotice() {
            const t = document.getElementById('title').value;
            const g = document.getElementById('tag').value || '[공지]';
            const c = document.getElementById('content').value;

            if(!t || !c) {
                alert("제목과 내용을 모두 입력하십시오.");
                return;
            }

            db.collection("notices").add({
                title: t,
                tag: g,
                content: c,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('title').value = '';
                document.getElementById('tag').value = '';
                document.getElementById('content').value = '';
                alert("공지가 성공적으로 등록되었습니다.");
            }).catch((error) => {
                console.error("작성 실패: ", error);
                alert("오류가 발생했습니다.");
            });
        }

        // Firebase 데이터 삭제
        function deleteNotice(docId) {
            if(confirm("이 공지를 삭제하시겠습니까?")) {
                db.collection("notices").doc(docId).delete().catch((error) => {
                    console.error("삭제 실패: ", error);
                });
            }
        }
    </script>
</body>
</html>
