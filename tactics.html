<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIX | TACTICS BOARD</title>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; padding-top: 100px; cursor: url('data:image/svg+xml;utf8,<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4 L22 11 L13 14 L9 24 Z" fill="%23ffffff" stroke="%23000000" stroke-width="1.5"/></svg>') 4 4, auto; }
        a, button, .tool-btn, .tool-color, .map-nav-btn { cursor: url('data:image/svg+xml;utf8,<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4 L22 11 L13 14 L9 24 Z" fill="%23ff5e00" stroke="%23ffffff" stroke-width="1.5"/></svg>') 4 4, pointer !important; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(0,0,0,0.95); position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 100; border-bottom: 1px solid #222; }
        nav .logo { font-weight: 900; font-size: 26px; color: #ff5e00; text-decoration: none; letter-spacing: 2px; }
        nav ul { list-style: none; display: flex; margin: 0; padding: 0; }
        nav ul li a { margin-left: 20px; font-size: 12px; font-weight: 600; color: #999; text-decoration: none; transition: 0.3s; }
        nav ul li a:hover { color: #ff5e00; }

        .tactics-header { text-align: center; margin-bottom: 30px; }
        .tactics-header h1 { font-size: 3rem; color: #ff5e00; font-weight: 900; margin: 0; letter-spacing: 5px; }
        .tactics-header p { color: #888; font-size: 1.1rem; }

        .tactics-container { max-width: 1600px; margin: 0 auto; padding: 0 5%; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        
        .map-main-area { background: #111; border: 1px solid #333; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .map-nav { display: flex; background: #1a1a1a; }
        .map-nav-btn { flex: 1; padding: 20px; border: none; background: none; color: #666; font-weight: 900; font-size: 1.2rem; transition: 0.3s; }
        .map-nav-btn.active { background: #ff5e00; color: white; }
        
        .map-canvas-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; }
        .map-canvas-wrapper img { width: 100%; height: 100%; object-fit: contain; display: block; }
        #tactical-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; touch-action: none; }

        .tools-sidebar { background: #111; border: 1px solid #333; border-radius: 12px; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .tool-section h3 { margin: 0 0 15px 0; color: #fff; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tool-btn { background: #222; color: #ccc; border: 1px solid #444; padding: 15px 10px; border-radius: 6px; font-weight: bold; font-size: 1rem; transition: 0.2s; text-align: center; }
        .tool-btn.active { background: #ff5e00; border-color: #ff5e00; color: #fff; box-shadow: 0 0 15px rgba(255,94,0,0.3); }
        .tool-btn:hover { background: #333; }

        .color-palette { display: flex; gap: 15px; margin-top: 15px; justify-content: center; background: #000; padding: 15px; border-radius: 8px; border: 1px solid #222; }
        .tool-color { width: 35px; height: 35px; border-radius: 50%; border: 3px solid transparent; transition: 0.2s; cursor: pointer; }
        .tool-color.active { border-color: #fff; box-shadow: 0 0 10px #fff; transform: scale(1.1); }

        .strategy-box { background: #000; padding: 20px; border-radius: 8px; border: 1px solid #222; flex: 1; }
        .strategy-box p { color: #aaa; line-height: 1.8; font-size: 0.95rem; margin: 0; }
        
        @media (max-width: 1000px) { .tactics-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false">

    <nav>
        <a href="index.html" class="logo">CLAN CLIX</a>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="tactics.html">TACTICS</a></li>
        </ul>
    </nav>

    <div class="tactics-header">
        <h1>CLIX BRIEFING ROOM</h1>
        <p>팀원들과 화면을 공유하며 전술을 수립하세요.</p>
    </div>

    <div class="tactics-container">
        <!-- 메인 맵 영역 -->
        <div class="map-main-area">
            <div class="map-nav">
                <button class="map-nav-btn active" onclick="showMap('erangel', this)">ERANGEL</button>
                <button class="map-nav-btn" onclick="showMap('miramar', this)">MIRAMAR</button>
            </div>
            <div class="map-canvas-wrapper">
                <!-- 이미지 링크를 다시 로컬 파일로 롤백 (엑스박스 방지) -->
                <img id="map-image" src="erangel.jpg" alt="Map" onerror="this.src='ERANGEL.JPG'">
                <canvas id="tactical-canvas"></canvas>
            </div>
        </div>

        <!-- 우측 도구 패널 -->
        <div class="tools-sidebar">
            <div class="tool-section">
                <h3>드로잉 툴</h3>
                <div class="tools-grid">
                    <button class="tool-btn active" id="tool-pen" onclick="setTool('pen')">✏️ 펜</button>
                    <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">🧹 지우개</button>
                </div>
                <button class="tool-btn" style="width:100%; margin-top:10px; background:#4a0000; color:#ff6b6b; border-color:#ff3333;" onclick="clearCanvas()">🗑️ 전체 지우기</button>
                
                <div class="color-palette">
                    <div class="tool-color active" style="background:#ff3333;" onclick="setColor('#ff3333', this)"></div>
                    <div class="tool-color" style="background:#33cc33;" onclick="setColor('#33cc33', this)"></div>
                    <div class="tool-color" style="background:#3399ff;" onclick="setColor('#3399ff', this)"></div>
                    <div class="tool-color" style="background:#ffffff;" onclick="setColor('#ffffff', this)"></div>
                </div>
            </div>

            <div class="tool-section">
                <h3>전술 스탬프</h3>
                <div class="tools-grid">
                    <button class="tool-btn" id="tool-stamp-car" onclick="setTool('stamp-car')">🚙 차량</button>
                    <button class="tool-btn" id="tool-stamp-enemy" onclick="setTool('stamp-enemy')">💀 적 발견</button>
                    <button class="tool-btn" id="tool-stamp-ping" onclick="setTool('stamp-ping')" style="grid-column: 1 / -1;">📍 위치 핑</button>
                </div>
            </div>

            <div class="tool-section" style="flex: 1; display: flex; flex-direction: column;">
                <h3 id="map-title" style="color: #ff5e00;">ERANGEL 핵심 전술</h3>
                <div class="strategy-box">
                    <p id="map-desc">
                        - 주요 차량 스폰: 강남, 포친키. 1페 중앙 점령 추천.<br><br>
                        - 외곽 강하: 밀타 파워, 노보 보트/차량 선점 필수.<br><br>
                        - 밀베 자기장: 다리 검문 대비 및 해안가 시야 확보.<br><br>
                        - 기습 포인트: 해우소 지붕 위 점령으로 통행세 징수
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let canvas, ctx, isDrawing = false;
        let currentTool = 'pen', currentColor = '#ff3333';

        function initCanvas() {
            canvas = document.getElementById('tactical-canvas');
            const img = document.getElementById('map-image');
            if(!canvas || !img) return;
            ctx = canvas.getContext('2d');
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            
            canvas.addEventListener('mousedown', startPosition);
            canvas.addEventListener('mouseup', endPosition);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseout', endPosition);
        }

        window.addEventListener('resize', () => { const img = document.getElementById('map-image'); if(img && img.complete) initCanvas(); });
        document.addEventListener('DOMContentLoaded', () => { const img = document.getElementById('map-image'); if(img.complete) initCanvas(); else img.onload = initCanvas; });

        function getMousePos(evt) { const rect = canvas.getBoundingClientRect(); return { x: evt.clientX - rect.left, y: evt.clientY - rect.top }; }

        function startPosition(e) { 
            if (currentTool.startsWith('stamp-')) drawStamp(e);
            else { isDrawing = true; draw(e); }
        }
        function endPosition() { isDrawing = false; ctx.beginPath(); }
        
        function draw(e) {
            if (!isDrawing) return;
            const pos = getMousePos(e);
            ctx.lineWidth = currentTool === 'eraser' ? 30 : 5; 
            ctx.lineCap = 'round';
            ctx.strokeStyle = currentTool === 'eraser' ? 'rgba(0,0,0,1)' : currentColor;
            ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function drawStamp(e) {
            const pos = getMousePos(e);
            ctx.font = '40px Arial'; 
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 8;
            let icon = '';
            if (currentTool === 'stamp-car') icon = '🚙';
            if (currentTool === 'stamp-enemy') icon = '💀';
            if (currentTool === 'stamp-ping') icon = '📍';
            ctx.fillText(icon, pos.x, pos.y);
            ctx.shadowBlur = 0; 
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tool-' + tool).classList.add('active');
        }

        function setColor(color, element) {
            currentColor = color; setTool('pen');
            document.querySelectorAll('.tool-color').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        function clearCanvas() { if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function showMap(mapName, btn) {
            document.querySelectorAll('.map-nav-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active');
            
            // 로컬 이미지 경로로 롤백
            const data = { 
                'erangel': [
                    'erangel.jpg', 
                    'ERANGEL 핵심 전술', 
                    '- 주요 차량 스폰: 강남, 포친키. 1페 중앙 점령 추천.<br><br>- 외곽 강하: 밀타 파워, 노보 보트/차량 선점 필수.<br><br>- 밀베 자기장: 다리 검문 대비 및 해안가 시야 확보.'
                ],
                'miramar': [
                    'miramar.jpg', 
                    'MIRAMAR 핵심 전술', 
                    '- 고지대 능선 점령 필수 시야 확보가 핵심<br><br>- 무기 구성: DMR/SR 장거리 무기 필수<br><br>- 차량: 픽업트럭 확보 및 능선 하단 회전.'
                ]
            };
            const m = data[mapName];
            const img = document.getElementById('map-image');
            img.src = m[0]; 
            // 이미지 오류 시 대문자로 한 번 더 시도
            img.onerror = function() { this.src = m[0].toUpperCase(); };
            img.onload = initCanvas; 
            document.getElementById('map-title').innerText = m[1];
            document.getElementById('map-desc').innerHTML = m[2];
            clearCanvas();
        }
    </script>
</body>
</html>
